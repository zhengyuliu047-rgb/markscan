services:
  web:
    build: .
    command: sh -c "npm run migrate:deploy && npm run start"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/data/markscan.db"
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  collector:
    build: .
    command: sh -c "sleep 5 && npm run start:collector"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/data/markscan.db"
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./data:/data
    depends_on:
      - web
    restart: unless-stopped
